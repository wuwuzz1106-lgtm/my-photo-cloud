<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的旗艦雲端相簿</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.3.7/photoswipe.min.css">

    <style>
        /* ================= 基礎視覺 (保留原本質感) ================= */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f5f5f7; color: #1d1d1f; padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #e5e5ea; }
        .header h1 { margin: 0; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .controls { display: flex; gap: 10px; }
        button { padding: 8px 16px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: #007aff; color: white; } .btn-primary:hover { background: #005bb5; }
        .btn-secondary { background: #e5e5ea; color: #1d1d1f; } .btn-secondary:hover { background: #d1d1d6; }
        .btn-danger { background: #ff3b30; color: white; }
        
        /* 網格與卡片 (找回原本設計) */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; position: relative; transition: transform 0.2s; aspect-ratio: 1; }
        .card:hover { transform: scale(1.02); }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.2s; }
        .card-title { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; padding: 8px; margin: 0; font-size: 14px; text-align: center; }

        /* 🛑 終極下載保護：防止長按 */
        .grid-container img { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-user-drag: none; pointer-events: none; }
        .card-title { pointer-events: none; }

        /* ================= 多選模式 UI (新功能保留) ================= */
        .checkbox-container { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; background: rgba(255,255,255,0.8); border: 2px solid #ccc; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 10; transition: 0.2s; }
        .select-mode .checkbox-container { display: flex; }
        .card.selected .checkbox-container { background: #007aff; border-color: #007aff; }
        .card.selected .checkbox-container::after { content: '✓'; color: white; font-weight: bold; }
        .card.selected img { opacity: 0.7; transform: scale(0.9); border-radius: 12px; }

        /* 浮動操作列 */
        .action-bar { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: #1d1d1f; color: white; padding: 12px 24px; border-radius: 30px; display: flex; gap: 20px; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: bottom 0.3s ease; z-index: 1000; }
        .action-bar.show { bottom: 30px; }
        
        /* 改名 UI */
        .rename-container { display: none; align-items: center; gap: 10px; }
        .rename-container input { padding: 6px 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 20px; font-weight: bold; width: 200px; }

        #fileInput { display: none; }
        
        #loadingOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); z-index: 3000; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loadingOverlay">系統處理中，請稍候...⏳</div>

    <div class="header">
        <h1>
            <span id="headerTitle">我的相簿</span>
            <button id="editNameBtn" class="btn-secondary" style="display: none; padding: 4px 8px;">✏️</button>
            <div id="renameContainer" class="rename-container">
                <input type="text" id="renameInput">
                <button id="saveRenameBtn" class="btn-primary">儲存</button>
                <button id="cancelRenameBtn" class="btn-secondary">取消</button>
            </div>
        </h1>
        <div class="controls">
            <button id="backBtn" class="btn-secondary" style="display:none;">返回</button>
            <input type="file" id="fileInput" multiple accept="image/*">
            <button id="uploadBtn" class="btn-primary" style="display:none;">上傳照片</button>
            <button id="newAlbumBtn" class="btn-primary">新增相簿</button>
            <button id="toggleSelectBtn" class="btn-secondary">選取</button>
        </div>
    </div>

    <div id="contentGrid" class="grid-container"></div>

    <div id="actionBar" class="action-bar">
        <span id="selectCount">已選取 0 項</span>
        <button id="batchDeleteBtn" class="btn-danger">刪除選取項目</button>
    </div>

    <script type="module">
        // ================= 引入 PhotoSwipe 專業絲滑引擎 =================
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.3.7/photoswipe-lightbox.esm.min.js';
        const lightbox = new PhotoSwipeLightbox({
            gallery: '#contentGrid', // 網格就是藝廊
            children: 'a.photo-item', // 藝廊內的照片項目
            pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.3.7/photoswipe.esm.min.js')
        });
        // 🛑 下載保護：PhotoSwipe 開啟時一樣禁止按右鍵
        lightbox.on('contentContextMenu', (e) => { e.preventDefault(); });
        lightbox.init();

        // ================= 封印右鍵 =================
        document.addEventListener('contextmenu', event => event.preventDefault());

        let dbData = {};
        let currentAlbum = null; 
        let isSelectMode = false;
        let selectedItems = new Set(); 

        const contentGrid = document.getElementById('contentGrid');
        const headerTitle = document.getElementById('headerTitle');
        const toggleSelectBtn = document.getElementById('toggleSelectBtn');
        const actionBar = document.getElementById('actionBar');
        const selectCount = document.getElementById('selectCount');
        const backBtn = document.getElementById('backBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const editNameBtn = document.getElementById('editNameBtn');
        const renameContainer = document.getElementById('renameContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // 取得資料
        async function loadData() {
            showLoading(true);
            try {
                const res = await fetch('/api/data');
                dbData = await res.json();
                if (currentAlbum) renderPhotos(currentAlbum);
                else renderAlbums();
            } catch (err) { alert('讀取資料失敗'); }
            showLoading(false);
        }

        // ================= 渲染邏輯 (找回你原本喜歡的介面) =================
        function renderAlbums() {
            currentAlbum = null;
            headerTitle.textContent = "我的相簿";
            headerTitle.style.display = "block";
            editNameBtn.style.display = "none";
            renameContainer.style.display = "none";
            backBtn.style.display = "none";
            uploadBtn.style.display = "none";
            document.getElementById('newAlbumBtn').style.display = "block";
            exitSelectMode();
            contentGrid.innerHTML = '';

            Object.keys(dbData).forEach(albumName => {
                const photos = dbData[albumName];
                const coverImg = photos.length > 0 ? photos[0].thumb : 'https://via.placeholder.com/400?text=Empty';
                const card = createCard(albumName, albumName, coverImg, false); // 不是照片，不能開啟絲滑藝廊
                card.onclick = (e) => handleCardClick(e, card, albumName, () => renderPhotos(albumName));
                contentGrid.appendChild(card);
            });
        }

        function renderPhotos(albumName) {
            currentAlbum = albumName;
            headerTitle.textContent = albumName;
            headerTitle.style.display = "block";
            editNameBtn.style.display = "block"; 
            backBtn.style.display = "block";
            uploadBtn.style.display = "block";
            document.getElementById('newAlbumBtn').style.display = "none";
            exitSelectMode();
            contentGrid.innerHTML = '';

            const photos = dbData[albumName] || [];
            photos.forEach(photo => {
                // 關鍵大改造：把照片卡片包裝成 PhotoSwipe 看得懂的格式 (具有 href, data-pswp-width, data-pswp-height)
                const card = createCard(photo.full, photo.filename, photo.thumb, true);
                // 點擊卡片的邏輯
                card.onclick = (e) => {
                    if (isSelectMode) {
                        handleCardClick(e, card, photo.full, null); // 選取模式下純粹打勾
                    }
                    // 非選取模式下，不做任何事，讓內層的 <a> 標籤去觸發 PhotoSwipe 絲滑藝廊
                };
                contentGrid.appendChild(card);
            });
        }

        function createCard(id, title, imgUrl, isPhoto) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.id = id;

            if (isPhoto) {
                // 如果是照片，內層要用 <a> 標籤包住圖片，並填上大圖尺寸 (這裡暫定一個大尺寸，PhotoSwipe 會自動調整)
                card.innerHTML = `
                    <a href="${imgUrl}" class="photo-item photo-link-hack" data-pswp-width="2500" data-pswp-height="2000" onclick="if(isSelectMode) return false;">
                        <img src="${imgUrl}" alt="${title}">
                        <p class="card-title">${title}</p>
                    </a>
                    <div class="checkbox-container"></div>
                `;
            } else {
                // 相簿卡片保持原本格式
                card.innerHTML = `
                    <img src="${imgUrl}" alt="${title}">
                    <p class="card-title">${title}</p>
                    <div class="checkbox-container"></div>
                `;
            }
            return card;
        }

        // ================= 互動邏輯：點擊與多選 =================
        function handleCardClick(e, cardElement, itemId, defaultAction) {
            if (isSelectMode) {
                // 如果是選取模式，點擊就是打勾/取消打勾
                e.stopPropagation(); // 阻止 <a> 標籤跳轉
                e.preventDefault();
                if (selectedItems.has(itemId)) {
                    selectedItems.delete(itemId);
                    cardElement.classList.remove('selected');
                } else {
                    selectedItems.add(itemId);
                    cardElement.classList.add('selected');
                }
                updateActionBar();
            } else if (defaultAction) {
                // 正常模式且是相簿，執行進度相簿動作
                defaultAction();
            }
        }

        // 切換多選模式
        toggleSelectBtn.onclick = () => {
            isSelectMode = !isSelectMode;
            if (isSelectMode) {
                contentGrid.classList.add('select-mode');
                toggleSelectBtn.textContent = '取消選取';
                toggleSelectBtn.classList.replace('btn-secondary', 'btn-primary');
            } else { exitSelectMode(); }
        };

        function exitSelectMode() {
            isSelectMode = false;
            selectedItems.clear();
            contentGrid.classList.remove('select-mode');
            toggleSelectBtn.textContent = '選取';
            toggleSelectBtn.classList.replace('btn-primary', 'btn-secondary');
            document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
            updateActionBar();
        }

        function updateActionBar() {
            selectCount.textContent = `已選取 ${selectedItems.size} 項`;
            if (selectedItems.size > 0) actionBar.classList.add('show');
            else actionBar.classList.remove('show');
        }

        // ================= 真實 API 連動 (全部保留) =================
        
        // 改名 API
        document.getElementById('saveRenameBtn').onclick = async () => {
            const newName = document.getElementById('renameInput').value.trim();
            if (newName && newName !== currentAlbum) {
                showLoading(true);
                const res = await fetch('/api/album/rename', {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldName: currentAlbum, newName: newName })
                });
                if (res.ok) { currentAlbum = newName; await loadData(); } 
                else { alert('改名失敗，名稱可能重複了！'); showLoading(false); }
            }
            document.getElementById('cancelRenameBtn').click();
        };

        // 批次刪除 API
        document.getElementById('batchDeleteBtn').onclick = async () => {
            if (!confirm(`確定要刪除這 ${selectedItems.size} 個項目嗎？這動作無法復原喔！`)) return;
            showLoading(true);
            const itemsArray = Array.from(selectedItems);
            let endpoint = currentAlbum === null ? '/api/albums/batch-delete' : '/api/photos/batch-delete';
            let payload = currentAlbum === null ? { albumNames: itemsArray } : { albumName: currentAlbum, photoUrls: itemsArray };

            const res = await fetch(endpoint, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) { await loadData(); } else { alert('刪除發生錯誤！'); showLoading(false); }
        };

        // 上傳檔案 API
        uploadBtn.onclick = () => fileInput.click();
        fileInput.onchange = async () => {
            if (!fileInput.files.length) return;
            showLoading(true);
            const formData = new FormData();
            formData.append('album', currentAlbum);
            for (let i = 0; i < fileInput.files.length; i++) { formData.append('photos', fileInput.files[i]); }
            try { await fetch('/api/upload', { method: 'POST', body: formData }); await loadData(); } 
            catch (err) { alert('上傳失敗'); showLoading(false); }
            fileInput.value = ''; 
        };

        // 建立新相簿 API
        document.getElementById('newAlbumBtn').onclick = async () => {
            const albumName = prompt("請輸入新相簿名稱：");
            if (albumName) {
                showLoading(true);
                await fetch('/api/albums', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ albumName })
                });
                await loadData();
            }
        };

        // ================= 輔助功能 =================
        function showLoading(show) { loadingOverlay.style.display = show ? 'flex' : 'none'; }

        // UI 狀態切換
        editNameBtn.onclick = () => {
            headerTitle.style.display = 'none'; editNameBtn.style.display = 'none';
            renameContainer.style.display = 'flex'; document.getElementById('renameInput').value = currentAlbum;
        };
        document.getElementById('cancelRenameBtn').onclick = () => {
            renameContainer.style.display = 'none'; headerTitle.style.display = 'block'; editNameBtn.style.display = 'block';
        };
        backBtn.onclick = renderAlbums;

        // 啟動！
        loadData();
    </script>
</body>
</html>
